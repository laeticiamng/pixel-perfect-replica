name: a11y + visual regression

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to keep CI snappy.
concurrency:
  group: a11y-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest-a11y:
    name: Vitest a11y suite (axe + tab + auth variants)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache Bun's global download/install store + the project's node_modules.
      # Keyed on bun.lock so any dependency change busts both layers atomically.
      - name: Cache Bun store + node_modules
        id: bun-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        if: steps.bun-cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Run axe / high-contrast / auth-variant unit tests
        run: bunx vitest run src/test/landing-a11y.test.tsx src/test/landing-states.test.tsx src/test/high-contrast.test.tsx

  playwright-a11y-visual:
    name: Playwright (Chromium) — axe runtime + tab + visual
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Layer 1 — Bun store + node_modules (shared key with the vitest job).
      - name: Cache Bun store + node_modules
        id: bun-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        if: steps.bun-cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      # Layer 2 — Playwright browser binaries (~300 MB). Keyed on the
      # Playwright version pinned in bun.lock so a `bun update` to a new
      # browser revision invalidates the cache automatically.
      - name: Resolve Playwright version
        id: pw-version
        run: |
          VERSION=$(node -p "require('./node_modules/@playwright/test/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Chromium (browser binaries)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium

      # System libs are NOT cached (apt state lives outside ~/.cache) — but
      # they're cheap (<10s) and required even on a browser-cache hit.
      - name: Install Chromium system dependencies
        run: bunx playwright install-deps chromium

      - name: Run Playwright (axe + tab traversal + visual normal/HC × mobile/desktop)
        run: bunx playwright test
        env:
          CI: '1'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 14
