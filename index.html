    <title>NEARVITY — Réseau social IRL : vois qui veut interagir près de toi</title>
    <meta name="description" content="NEARVITY est le seul réseau social qui montre en temps réel qui est ouvert à l'interaction autour de toi. Pas de swipe, pas de like : des rencontres spontanées IRL entre étudiants, freelances et curieux. Gratuit." />
    <meta name="keywords" content="réseau social IRL, rencontres réelles, interactions spontanées, étudiants, anti-solitude, géolocalisation, signal social, NEARVITY" />

    <!-- JSON-LD: WebApplication (GEO-optimized) -->

    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "NEARVITY",
      "alternateName": "Nearvity",
      "applicationCategory": "SocialNetworkingApplication",
      "operatingSystem": "Web, iOS, Android",
      "description": "NEARVITY est le premier réseau social IRL (In Real Life). Il permet de voir en temps réel qui est ouvert à l'interaction autour de soi grâce à un système de signaux géolocalisés (vert = disponible, jaune = occupé mais ouvert, rouge = indisponible). Pas de swipe, pas de matching algorithmique : des rencontres spontanées et consenties entre étudiants, freelances et curieux.",
      "url": "https://nearvity.fr",
      "browserRequirements": "Requires JavaScript, Geolocation API",
      "featureList": [
        "Signal de disponibilité géolocalisé en temps réel",
        "Système de feux tricolores (vert/jaune/rouge) pour indiquer son ouverture à l'interaction",
        "Réservation de sessions d'étude, sport ou repas entre utilisateurs proches",
        "Carte interactive avec radar de proximité",
        "Système anti-harcèlement avec mode fantôme et blocage bidirectionnel",
        "Icebreakers contextuels selon l'activité",
        "100% gratuit, pas de publicité, pas de vente de données"
      ],
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR",
        "description": "Gratuit — version premium optionnelle pour fonctionnalités avancées"
      },
      "author": {
        "@type": "Organization",
        "name": "EmotionsCare SASU",
        "url": "https://nearvity.fr",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "FR"
        }
      },
      "audience": {
        "@type": "Audience",
        "audienceType": "Étudiants, freelances, digital nomads, personnes souhaitant lutter contre l'isolement social"
      }
    }
    </script>

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "NEARVITY",
      "legalName": "EmotionsCare SASU",
      "url": "https://nearvity.fr",
      "logo": "https://nearvity.fr/apple-touch-icon.png",
      "description": "NEARVITY développe le premier réseau social centré sur les interactions en personne (IRL). Contrairement aux réseaux sociaux classiques qui créent de l'isolement derrière des écrans, NEARVITY utilise la géolocalisation pour connecter les gens qui veulent réellement se rencontrer, dans la vraie vie, maintenant.",
      "foundingDate": "2025",

        "@type": "ContactPoint",

      },
      "sameAs": [],

        "@type": "PostalAddress",
        "addressCountry": "FR"

        "Social networking",
        "Real-life interactions",
        "Geolocation-based social apps",
        "Student loneliness",
        "Spontaneous meetups"
      ]
    }
    </script>

    <!-- JSON-LD: FAQPage (GEO-critical for AI engines) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Qu'est-ce que NEARVITY ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEARVITY est le premier réseau social 100% IRL (In Real Life). Il permet de voir en temps réel qui est ouvert à l'interaction autour de soi, grâce à un système de signaux géolocalisés. Pas de swipe, pas de like, pas de matching algorithmique : uniquement des rencontres spontanées et consenties."
          }
        },
        {
          "@type": "Question",
          "name": "NEARVITY est-il une application de rencontre ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Non. NEARVITY n'est PAS une app de rencontre amoureuse. C'est un réseau social pour les interactions du quotidien : étudier ensemble, manger, discuter, faire du sport. Il s'adresse aux étudiants, freelances et à toute personne souhaitant briser l'isolement social."
          }
        },
        {
          "@type": "Question",
          "name": "Comment fonctionne le système de signaux NEARVITY ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "L'utilisateur active un signal géolocalisé avec une couleur (vert = disponible, jaune = occupé mais ouvert, rouge = indisponible) et une activité (étudier, manger, discuter, sport). Les personnes proches voient ce signal sur une carte et peuvent approcher en sachant que l'interaction est bienvenue."
          }
        },
        {
          "@type": "Question",
          "name": "NEARVITY est-il gratuit ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, NEARVITY est entièrement gratuit. Une version premium optionnelle existe pour des fonctionnalités avancées comme un rayon de visibilité élargi et des sessions de groupe illimitées."
          }
        },
        {
          "@type": "Question",
          "name": "Comment NEARVITY protège-t-il la vie privée ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEARVITY intègre un mode fantôme, un blocage bidirectionnel, une expiration automatique des signaux après 2 heures, un floutage des coordonnées GPS (~100m de précision), et un bouton SOS d'urgence. Aucune donnée de localisation n'est vendue à des tiers."
          }
        },
        {
          "@type": "Question",
          "name": "Quelle est la différence entre NEARVITY et les autres réseaux sociaux ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Les réseaux sociaux classiques (Instagram, TikTok, Twitter) créent de l'interaction numérique qui augmente l'isolement. NEARVITY fait l'inverse : il utilise la technologie uniquement comme pont vers des rencontres physiques réelles. Pas de fil d'actualité, pas de contenu à consommer, pas de dopamine artificielle."
          }
        }
      ]
    }
    </script>
